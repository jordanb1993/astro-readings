<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09102a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Miriam — Natal Chart Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  background: #09102a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px 88px;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Lock body scroll when sheet open */
body.drawer-open { overflow: hidden; }

/* ── PAGE CHROME ── */
.chart-label {
  font-size: 0.60rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(212,180,80,0.65);
  margin-bottom: 24px;
  text-align: center;
}

.chart-wrap {
  width: min(720px, 96vw);
  height: min(720px, 96vw);
  touch-action: pan-x pan-y pinch-zoom;
}

#chart-svg {
  display: block;
  width: 100%; height: 100%;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-variant-emoji: text;
}
#chart-svg text { font-variant-emoji: text; }

.chart-sub {
  margin-top: 20px;
  font-size: 0.57rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240,228,200,0.22);
  text-align: center;
}

/* ── FLOATING KEY BUTTON ── */
.key-btn {
  position: fixed;
  bottom: max(24px, calc(env(safe-area-inset-bottom) + 14px));
  right:  max(24px, calc(env(safe-area-inset-right)  + 14px));
  height: 40px;
  padding: 0 18px 0 14px;
  border-radius: 40px;
  background: radial-gradient(ellipse at 30% 50%, #121e36 0%, #0d1c38 100%);
  border: 1px solid rgba(212,180,80,0.45);
  color: rgba(212,180,80,0.90);
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.50), 0 0 0 1px rgba(212,180,80,0.08);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  z-index: 100;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.key-btn-icon { font-size: 0.90rem; font-family: 'Cormorant Garamond', serif; opacity: 0.88; }
.key-btn:hover  { border-color: rgba(212,180,80,0.75); box-shadow: 0 4px 32px rgba(0,0,0,0.60), 0 0 20px rgba(212,180,80,0.12); }
.key-btn:active { transform: scale(0.97); }

/* ── DIM OVERLAY ── */
.key-dimmer {
  position: fixed; inset: 0; z-index: 498;
  background: rgba(8,22,46,0.30);
  opacity: 0; pointer-events: none;
  transition: opacity 0.32s ease;
}
.key-dimmer.open { opacity: 1; pointer-events: auto; }

/* ── KEY TABS ── */
.key-tabs {
  display: flex; padding: 0 16px;
  border-bottom: 1px solid rgba(212,180,80,0.10);
  flex-shrink: 0; gap: 0;
}
.key-tab {
  background: none; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 0.60rem; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(240,228,200,0.30);
  padding: 10px 14px 8px;
  min-height: 44px;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.key-tab.active { color: rgba(212,180,80,0.88); border-bottom-color: rgba(212,180,80,0.55); }
.key-panel { display: none; }
.key-panel.active { display: block; }

@keyframes ki-pulse {
  0%   { background: rgba(212,180,80,0.20); border-color: rgba(212,180,80,0.40); }
  100% { background: rgba(240,228,200,0.022); border-color: rgba(212,180,80,0.07); }
}
.ki-highlight { animation: ki-pulse 1.1s ease-out forwards; }

/* ── BOTTOM SHEET ── */
.key-overlay {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: auto;
  max-height: 46vh;
  z-index: 500;
  background: linear-gradient(180deg, rgba(14,20,54,0.99) 0%, rgba(9,16,42,0.99) 100%);
  border-top: 1px solid rgba(212,180,80,0.22);
  border-radius: 18px 18px 0 0;
  box-shadow: 0 -8px 56px rgba(0,0,0,0.65);
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.34s cubic-bezier(0.32,0,0.18,1);
  will-change: transform;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.key-overlay.open { transform: translateY(0); }

/* drag handle */
.key-handle {
  width: 38px; height: 4px;
  background: rgba(212,180,80,0.28);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
  cursor: grab;
}

/* ── SHEET HEADER ── */
.key-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 22px 12px;
  border-bottom: 1px solid rgba(212,180,80,0.10);
  flex-shrink: 0;
}

.key-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 300;
  color: rgba(212,180,80,0.88);
  letter-spacing: 0.10em;
  margin: 0;
}

.key-close {
  background: none; border: none;
  color: rgba(240,228,200,0.40);
  font-size: 1.0rem; cursor: pointer;
  font-family: 'Inter', sans-serif;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  padding: 4px 8px;
  transition: color 0.15s;
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.08em;
  font-size: 0.62rem; text-transform: uppercase;
}
.key-close:hover  { color: rgba(240,228,200,0.80); }
.key-close:active { color: rgba(240,228,200,1.00); }

/* ── SHEET CONTENT (scrollable) ── */
.key-content {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  flex: 1; min-height: 0;
  padding: 16px 20px;
  padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px));
  scrollbar-width: thin;
  scrollbar-color: rgba(212,180,80,0.28) transparent;
}
.key-content::-webkit-scrollbar { width: 4px; }
.key-content::-webkit-scrollbar-track { background: transparent; }
.key-content::-webkit-scrollbar-thumb { background: rgba(212,180,80,0.28); border-radius: 4px; }
.key-content::-webkit-scrollbar-thumb:hover { background: rgba(212,180,80,0.52); }

.key-section { margin-bottom: 20px; }

.key-sh {
  font-size: 0.54rem; letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(212,180,80,0.45);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(212,180,80,0.09);
}

/* ── PLACEMENT ROWS ── */
.key-grid { display: flex; flex-direction: column; gap: 3px; }

.ki {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: center;
  gap: 0 10px;
  padding: 8px 10px;
  background: rgba(240,228,200,0.022);
  border: 1px solid rgba(212,180,80,0.07);
  border-radius: 7px;
  touch-action: manipulation;
  transition: background 0.15s;
}
.ki:hover { background: rgba(240,228,200,0.045); }

.ki-gl {
  font-size: 16px;
  font-family: 'Apple Symbols','Segoe UI Symbol','Noto Sans Symbols',serif;
  flex-shrink: 0; line-height: 1;
  font-variant-emoji: text;
  text-align: center;
}
.ki-main {
  display: flex; flex-direction: column; gap: 1px; min-width: 0;
}
.ki-name {
  font-size: 0.80rem;
  font-family: 'Cormorant Garamond', serif;
  color: rgba(240,228,200,0.88);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.ki-note {
  font-size: 0.60rem;
  font-family: 'Inter', sans-serif;
  color: rgba(240,228,200,0.36);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.ki-house {
  font-size: 0.62rem;
  font-family: 'Inter', sans-serif;
  color: rgba(212,180,80,0.50);
  letter-spacing: 0.06em;
  white-space: nowrap;
  text-align: right;
}

/* aspect legend rows */
.ki-asp {
  display: grid;
  grid-template-columns: 36px 1fr;
  align-items: center;
  gap: 0 10px;
  padding: 6px 10px;
  background: rgba(240,228,200,0.018);
  border: 1px solid rgba(212,180,80,0.06);
  border-radius: 7px;
}

/* element legend */
.ki-el {
  display: grid;
  grid-template-columns: 10px 1fr;
  align-items: center;
  gap: 0 10px;
  padding: 6px 10px;
  background: rgba(240,228,200,0.018);
  border: 1px solid rgba(212,180,80,0.06);
  border-radius: 7px;
}
.ki-sw { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── EMBED MODE (?embed=1) ── */
html.embed body {
  padding: 0;
  min-height: unset;
  background: transparent;
  justify-content: flex-start;
}
html.embed .chart-label,
html.embed .chart-sub { display: none; }
html.embed .chart-wrap { width: 100%; height: min(100vw, 680px); }
html.embed .key-btn { display: none; }

/* ── TABLET (≤768px) ── */
@media (max-width: 768px) {
  body { padding: 32px 16px 88px; }
  .chart-label { letter-spacing: 0.20em; margin-bottom: 20px; }
}

/* ── MOBILE (≤600px) ── */
@media (max-width: 600px) {
  body { padding: 18px 10px 80px; }
  .chart-label { font-size: 0.58rem; letter-spacing: 0.14em; margin-bottom: 14px; }
  .chart-sub   { font-size: 0.54rem; letter-spacing: 0.11em; margin-top: 12px; }
  .chart-wrap  { width: min(720px, 98vw); height: min(720px, 98vw); }
  .key-overlay { max-height: 65vh; }
  .key-header  { padding: 8px 16px 10px; }
  .key-content { padding: 12px 14px; }
  .key-btn     { width: 52px; height: 52px; font-size: 1.45rem; }
}

/* ── LANDSCAPE MOBILE (short + wide) ── */
@media (max-height: 500px) and (orientation: landscape) {
  body { padding: 10px 16px; flex-direction: row; gap: 16px; align-items: center; justify-content: center; }
  .chart-label, .chart-sub { display: none; }
  .chart-wrap { width: min(440px, 58vw); height: min(440px, 58vw); }
  .key-btn { bottom: 10px; right: 10px; }
}
</style>
</head>
<body>

<div class="chart-label">Natal Chart &nbsp;·&nbsp; Miriam</div>
<div class="chart-wrap">
  <svg id="chart-svg" viewBox="-22 -22 764 764" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
</div>
<div class="chart-sub">April 9, 1995 &nbsp;·&nbsp; 10:12 PM CDT &nbsp;·&nbsp; Chicago, Illinois &nbsp;·&nbsp; Placidus</div>

<!-- Floating key toggle button -->
<button class="key-btn" id="keyBtn" title="Open Chart Key">
  <span class="key-btn-icon">✦</span>Chart Key
</button>

<!-- Dim overlay (click to close) -->
<div class="key-dimmer" id="keyDimmer"></div>

<!-- Bottom sheet key -->
<div class="key-overlay" id="keyOverlay" role="complementary" aria-label="Chart Key">

  <div class="key-handle" id="keyHandle"></div>

  <div class="key-header">
    <div class="key-title">Miriam's Chart</div>
    <button class="key-close" id="keyClose" aria-label="Close key">Done</button>
  </div>
  <div class="key-tabs">
    <button class="key-tab active" data-panel="placements">Placements</button>
    <button class="key-tab" data-panel="aspects">Aspects</button>
    <button class="key-tab" data-panel="houses">Houses</button>
  </div>
  <div class="key-content">
    <div class="key-panel active" id="panel-placements">
      <div class="key-grid" id="kP"></div>
    </div>
    <div class="key-panel" id="panel-aspects">
      <div class="key-section">
        <div class="key-sh">Aspect Lines</div>
        <div class="key-grid" id="kA"></div>
      </div>
      <div class="key-section">
        <div class="key-sh">Elements</div>
        <div class="key-grid" id="kE"></div>
      </div>
    </div>
    <div class="key-panel" id="panel-houses">
      <div class="key-grid" id="kH"></div>
    </div>
  </div>

</div>

<script>
const T = '︎'; // text variation selector — prevents emoji rendering

// ─── CHART DATA ──────────────────────────────────────────────────────────────
const CHART = {
  asc: 233.1376, mc: 156.5083,
  cusps: [233.1376, 263.6887, 299.6644, 336.5083, 7.9632, 32.8485, 53.1376, 83.6887, 119.6644, 156.5083, 187.9632, 212.8485],
  planets: [
    {id:'sun',     gl:'☉'+T, deg: 19.7970, retro:false, grp:'luminary', si:0,  sd:19},
    {id:'moon',    gl:'☽'+T, deg:131.4381, retro:false, grp:'luminary', si:4,  sd:11},
    {id:'mercury', gl:'☿'+T, deg: 15.0657, retro:false, grp:'personal', si:0,  sd:15},
    {id:'venus',   gl:'♀'+T, deg:345.4982, retro:false, grp:'personal', si:11, sd:15},
    {id:'mars',    gl:'♂'+T, deg:134.6970, retro:false, grp:'personal', si:4,  sd:14},
    {id:'jupiter', gl:'♃'+T, deg:255.2671, retro:true,  grp:'social',   si:8,  sd:15},
    {id:'saturn',  gl:'♄'+T, deg:349.1871, retro:false, grp:'social',   si:11, sd:19},
    {id:'uranus',  gl:'♅'+T, deg:300.2095, retro:false, grp:'outer',    si:10, sd: 0},
    {id:'neptune', gl:'♆'+T, deg:295.4630, retro:false, grp:'outer',    si:9,  sd:25},
    {id:'pluto',   gl:'♇'+T, deg:240.2318, retro:true,  grp:'outer',    si:8,  sd: 0},
    {id:'chiron',  gl:'⚷'+T, deg:171.2903, retro:true,  grp:'point',    si:5,  sd:21},
    {id:'nnode',   gl:'☊'+T, deg:216.5178, retro:true,  grp:'point',    si:7,  sd: 6},
  ],
  aspects:[
    {p1:'nnode',   p2:'mc',      type:'sextile',    orb:0.01},
    {p1:'mercury', p2:'jupiter', type:'trine',      orb:0.20},
    {p1:'venus',   p2:'jupiter', type:'square',     orb:0.23},
    {p1:'mercury', p2:'mars',    type:'trine',      orb:0.37},
    {p1:'mars',    p2:'jupiter', type:'trine',      orb:0.57},
    {p1:'sun',     p2:'chiron',  type:'inconjunct', orb:1.49},
    {p1:'saturn',  p2:'chiron',  type:'opposition', orb:2.10},
  ],
};

// ─── GEOMETRY ────────────────────────────────────────────────────────────────
const CX=360, CY=360;
const R = {
  rim3:   354, elArc:  347, rim1:   340,
  zodOut: 328, zodMid: 302, zodIn:  276,
  cuspLbl:265, hNum:   162, sepRing:240,
  pGlyph: 244, pLbl:   258,
  asp:    218, cRing:  18,  cDot:   11,
};

// ─── PALETTE — WHIMSIGOTH SACRED GEOMETRY ────────────────────────────────────
// Jewel navy base, warm gold, cerulean, amber — NO purple
const C = {
  gold:       '#d0a840',
  goldM:      'rgba(208,168,64,0.28)',
  goldBrt:    'rgba(208,168,64,0.58)',
  goldF:      'rgba(208,168,64,0.07)',
  ivory:      '#f0e4cc',
  ivoryM:     'rgba(240,228,200,0.55)',
  ivoryDim:   'rgba(240,228,200,0.28)',
  ivoryDimmer:'rgba(240,228,200,0.14)',
  // Blues
  cerulean:   '#3e8fc0',
  ceruleanM:  'rgba(62,143,192,0.60)',
  ceruleanF:  'rgba(62,143,192,0.10)',
  sky:        '#6abce0',
  moonSilver: '#b0c8e0',
  // Teal stays
  teal:       '#5ab8a8',
  tealM:      'rgba(90,184,168,0.60)',
  // Warm rose (not purple)
  rose:       '#c89898',
  roseM:      'rgba(200,152,152,0.65)',
  // Element fills — watercolor washes
  fire:   'rgba(210,130,48,0.26)',
  earth:  'rgba(80,142,68,0.19)',
  air:    'rgba(80,112,200,0.20)',
  water:  'rgba(40,128,188,0.28)',
  // Element arc colors on outer rim
  fireArc:  '#c87840',
  earthArc: '#58925a',
  airArc:   '#5878c8',
  waterArc: '#3880b8',
  // Structural
  axis:   'rgba(208,168,64,0.72)',
  hLine:  'rgba(208,168,64,0.15)',
};

const PLANET_COLOR = {
  luminary: '#d8b850',
  personal: '#c8a0a0',
  social:   '#7ab0d0',
  outer:    '#5ab8a8',
  point:    'rgba(240,228,200,0.70)',
};

const ASP_STYLE = {
  conjunction: {color:'#d0a840',                 dash:'',   w:1.2,op:0.82},
  sextile:     {color:'#3e8fc0',                 dash:'',   w:0.9,op:0.70},
  trine:       {color:'#5ab8a8',                 dash:'',   w:0.9,op:0.65},
  square:      {color:'#c89898',                 dash:'5,3',w:0.9,op:0.75},
  opposition:  {color:'#c89898',                 dash:'',   w:0.9,op:0.68},
  inconjunct:  {color:'rgba(240,228,200,0.38)',   dash:'2,4',w:0.7,op:0.65},
};

const SIGNS = [
  {gl:'♈'+T,el:'fire', name:'Aries',      abbr:'Ar',color:'#d4a050'},
  {gl:'♉'+T,el:'earth',name:'Taurus',     abbr:'Ta',color:'#80c070'},
  {gl:'♊'+T,el:'air',  name:'Gemini',     abbr:'Ge',color:'#8090d8'},
  {gl:'♋'+T,el:'water',name:'Cancer',     abbr:'Cn',color:'#50b8d0'},
  {gl:'♌'+T,el:'fire', name:'Leo',        abbr:'Le',color:'#d4a050'},
  {gl:'♍'+T,el:'earth',name:'Virgo',      abbr:'Vi',color:'#80c070'},
  {gl:'♎'+T,el:'air',  name:'Libra',      abbr:'Li',color:'#8090d8'},
  {gl:'♏'+T,el:'water',name:'Scorpio',    abbr:'Sc',color:'#50b8d0'},
  {gl:'♐'+T,el:'fire', name:'Sagittarius',abbr:'Sg',color:'#d4a050'},
  {gl:'♑'+T,el:'earth',name:'Capricorn',  abbr:'Cp',color:'#80c070'},
  {gl:'♒'+T,el:'air',  name:'Aquarius',   abbr:'Aq',color:'#8090d8'},
  {gl:'♓'+T,el:'water',name:'Pisces',     abbr:'Pi',color:'#50b8d0'},
];

const GLYPH_FONT = "'Apple Symbols','Segoe UI Symbol','Noto Sans Symbols',serif";
const MODALITY = {Ar:'Cardinal',Ta:'Fixed',Ge:'Mutable',Cn:'Cardinal',Le:'Fixed',Vi:'Mutable',Li:'Cardinal',Sc:'Fixed',Sg:'Mutable',Cp:'Cardinal',Aq:'Fixed',Pi:'Mutable'};

// ─── MATH ────────────────────────────────────────────────────────────────────
const norm = a=>((a%360)+360)%360;
const rad  = d=>d*Math.PI/180;
const f    = n=>n.toFixed(2);
const svgA = (ecl,asc)=>norm(180-(ecl-asc));
const pt   = (a,r)=>({x:CX+r*Math.cos(rad(a)),y:CY+r*Math.sin(rad(a))});
const ept  = (ecl,r,asc)=>pt(svgA(ecl,asc),r);

function sector(s,e,rO,rI,asc){
  const a1=svgA(s,asc),a2=svgA(e,asc);
  const o1=pt(a1,rO),o2=pt(a2,rO),i1=pt(a1,rI),i2=pt(a2,rI);
  return `M${f(o1.x)} ${f(o1.y)} A${rO} ${rO} 0 0 0 ${f(o2.x)} ${f(o2.y)} L${f(i2.x)} ${f(i2.y)} A${rI} ${rI} 0 0 1 ${f(i1.x)} ${f(i1.y)}Z`;
}
function arcStroke(s,e,r,asc){
  const a1=svgA(s,asc),a2=svgA(e,asc);
  const p1=pt(a1,r),p2=pt(a2,r);
  return `M${f(p1.x)} ${f(p1.y)} A${r} ${r} 0 0 0 ${f(p2.x)} ${f(p2.y)}`;
}
function eclSD(ecl){
  const idx=Math.floor(ecl/30)%12;
  return {idx,deg:Math.floor(ecl%30),sign:SIGNS[idx]};
}

// ─── SPREAD ──────────────────────────────────────────────────────────────────
function spread(planets){
  const sorted=[...planets].sort((a,b)=>a.deg-b.deg);
  const out=[];let i=0;
  while(i<sorted.length){
    let j=i+1;
    while(j<sorted.length&&sorted[j].deg-sorted[i].deg<8)j++;
    const cl=sorted.slice(i,j);
    if(cl.length===1){out.push({...cl[0],disp:cl[0].deg});}
    else{
      const mean=cl.reduce((s,p)=>s+p.deg,0)/cl.length;
      const step=cl.length===2?14:11;
      const off=-(cl.length-1)*step/2;
      cl.forEach((p,k)=>out.push({...p,disp:mean+off+k*step}));
    }
    i=j;
  }
  return out;
}

// ─── SVG HELPERS ─────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,String(v));
  return e;
}
function tx(content,attrs){const t=el('text',attrs);t.textContent=content;return t;}
function glTx(content,x,y,size,color,opacity,extra={}){
  return tx(content,{x:f(x),y:f(y),fill:color,opacity,
    'font-size':size,'font-family':GLYPH_FONT,'font-variant-emoji':'text',
    'text-anchor':'middle','dominant-baseline':'central',...extra});
}

  defs.appendChild(fG);

  svg.appendChild(defs);
}

  for(let i=0;i<12;i++){

    }));

    // Watercolor bloom — element-tinted blurred circle at house midpoint

    const signIdx = Math.floor(CHART.cusps[i]/30) % 12;

    // Marker dot at zodiac inner edge
    g.appendChild(el('circle',{cx:f(oP.x),cy:f(oP.y),r:isAngle?2.2:1.6,
      fill:isAngle?C.gold:C.goldM,opacity:isAngle?'0.85':'0.55'}));

    // Marker dot at separator ring — tracks the boundary through the planet zone
    const sp=ept(cusp,R.sepRing,CHART.asc);
    g.appendChild(el('circle',{cx:f(sp.x),cy:f(sp.y),r:isAngle?2.4:1.5,
      fill:isAngle?C.gold:C.goldM,opacity:isAngle?'0.80':'0.48'}));

    // Cusp degree + sign label — larger & more legible
    const{deg,sign}=eclSD(cusp);

// ─── PLANETS ─────────────────────────────────────────────────────────────────
function drawPlanets(svg){
  const g=el('g',{id:'planets'});
  const sp=spread(CHART.planets);

  for(const p of sp){
    const color=PLANET_COLOR[p.grp];
    const sign=SIGNS[p.si];

    // True position dot on inner circle
    const tP=ept(p.deg,R.asp,CHART.asc);
    g.appendChild(el('circle',{cx:f(tP.x),cy:f(tP.y),r:2.8,fill:color,opacity:'0.88'}));

    // Connector when spread
    if(Math.abs(p.disp-p.deg)>2.5){
      const lA=ept(p.deg,R.asp+5,CHART.asc),lB=ept(p.disp,R.pGlyph-14,CHART.asc);
      g.appendChild(el('line',{x1:f(lA.x),y1:f(lA.y),x2:f(lB.x),y2:f(lB.y),stroke:color,'stroke-width':'0.5',opacity:'0.42'}));
    }

    // Degree + sign OUTSIDE glyph (near zodiac ring)
    const lp=ept(p.disp,R.pLbl,CHART.asc);
    g.appendChild(tx(`${p.sd}°`,{x:f(lp.x),y:f(lp.y-4.2),fill:color,opacity:'0.72',
      'font-size':8,'font-family':"'Inter',sans-serif",'text-anchor':'middle','dominant-baseline':'central'}));
    g.appendChild(glTx(sign.gl,lp.x,lp.y+5.2,8.5,color,'0.68'));

    // Glyph
    const gp=ept(p.disp,R.pGlyph,CHART.asc);
    g.appendChild(el('circle',{cx:f(gp.x),cy:f(gp.y),r:13,fill:color,opacity:'0.05'}));
    g.appendChild(glTx(p.gl,gp.x,gp.y,21,color,'0.97'));

    // Retrograde Rx — same radius, adjacent, larger
    if(p.retro){
      const rxA=svgA(p.disp,CHART.asc)+9;
      const rxP=pt(rxA,R.pGlyph-10);
      g.appendChild(tx('Rx',{x:f(rxP.x),y:f(rxP.y),fill:color,opacity:'0.68',
        'font-size':7.5,'font-family':"'Inter',sans-serif",'font-style':'italic',
        'text-anchor':'middle','dominant-baseline':'central'}));
    }
    // Invisible hit target — click opens key to this planet
    const hit=el('circle',{cx:f(gp.x),cy:f(gp.y),r:18,fill:'transparent',style:'cursor:pointer'});
    hit.addEventListener('click',()=>openKeyToPlanet(p.id));
    g.appendChild(hit);
  }
  svg.appendChild(g);
}

// Returns 1-based house number for an ecliptic degree
function houseOf(deg) {
  const c = CHART.cusps;
  for (let i = 0; i < 12; i++) {
    const start = c[i];
    const end   = c[(i + 1) % 12];
    const d     = ((deg - start + 360) % 360);
    const span  = ((end  - start + 360) % 360);
    if (d < span) return i + 1;
  }
  return 1;
}

    eg.appendChild(d);

  // ── HOUSES
    const HOUSES = [

    {n:11,theme:'Community & Vision',       note:'Collective, friendships, ideals, the future'},
    {n:12,theme:'Soul & Solitude',          note:'Hidden self, retreat, dissolution, the deep unconscious'},

// ── KEY TOGGLE + TABS ────────────────────────────────────────────────────────
const overlay = document.getElementById('keyOverlay');
const dimmer  = document.getElementById('keyDimmer');
const btn     = document.getElementById('keyBtn');

function openKey() {
  overlay.classList.add('open');
  dimmer.classList.add('open');
  document.body.classList.add('drawer-open');
  btn.title = 'Close Chart Key';
}
function closeKey() {
  overlay.classList.remove('open');
  dimmer.classList.remove('open');
  document.body.classList.remove('drawer-open');
  btn.title = 'Open Chart Key';
}
function switchTab(panelId) {
  document.querySelectorAll('.key-tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panelId));
  document.querySelectorAll('.key-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + panelId));
  document.querySelector('.key-content').scrollTop = 0;
}
document.querySelectorAll('.key-tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.panel)));

function openKeyToPlanet(planetId) {
  openKey();
  switchTab('placements');
  setTimeout(() => {
    const row = document.querySelector(`[data-planet-id="${planetId}"]`);
    if (row) {
      row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      row.classList.add('ki-highlight');
      setTimeout(() => row.classList.remove('ki-highlight'), 1100);
    }
  }, 360);
}

btn.addEventListener('click', () => overlay.classList.contains('open') ? closeKey() : openKey());
document.getElementById('keyClose').addEventListener('click', closeKey);
dimmer.addEventListener('click', closeKey);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeKey(); });

let _swipeY = 0;
overlay.addEventListener('touchstart', e => { _swipeY = e.touches[0].clientY; }, { passive: true });
overlay.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - _swipeY > 80) closeKey();
}, { passive: true });

window.addEventListener('message', e => {
  if (e.data === 'toggle-key') overlay.classList.contains('open') ? closeKey() : openKey();
});
