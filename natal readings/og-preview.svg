<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2e0e30"/>
      <stop offset="45%"  stop-color="#1a0628"/>
      <stop offset="100%" stop-color="#09020e"/>
    </linearGradient>
    <linearGradient id="rose-stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c06080" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c06080" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold-stripe" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#c89020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c89020" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#rose-stripe)"/>
  <rect width="1200" height="630" fill="url(#gold-stripe)"/>

