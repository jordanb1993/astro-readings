<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09102a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Carina — Natal Chart Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  background: #09102a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px 88px;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Lock body scroll when drawer open */
body.drawer-open { overflow: hidden; }

/* ── PAGE CHROME ── */
.chart-label {
  font-size: 0.60rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(212,180,80,0.65);
  margin-bottom: 24px;
  text-align: center;
}

.chart-wrap {
  width: min(720px, 96vw);
  height: min(720px, 96vw);
  touch-action: pan-x pan-y pinch-zoom;
}

#chart-svg {
  display: block;
  width: 100%; height: 100%;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-variant-emoji: text;
}
#chart-svg text { font-variant-emoji: text; }

.chart-sub {
  margin-top: 20px;
  font-size: 0.57rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240,228,200,0.22);
  text-align: center;
}

/* ── FLOATING KEY BUTTON ── */
.key-btn {
  position: fixed;
  bottom: max(24px, calc(env(safe-area-inset-bottom) + 14px));
  right:  max(24px, calc(env(safe-area-inset-right)  + 14px));
  width: 48px; height: 48px;
  min-width: 44px; min-height: 44px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 40% 35%, #1a2d50, #091830);
  border: 1px solid rgba(212,180,80,0.50);
  color: rgba(212,180,80,0.90);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.50), 0 0 14px rgba(212,180,80,0.08);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  z-index: 100;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.key-btn:hover {
  border-color: rgba(212,180,80,0.80);
  box-shadow: 0 4px 28px rgba(0,0,0,0.60), 0 0 22px rgba(212,180,80,0.16);
  transform: scale(1.06);
}
.key-btn:active { transform: scale(0.96); }

/* ── DIM OVERLAY ── */
.key-dimmer {
  position: fixed; inset: 0; z-index: 498;
  background: rgba(8,22,46,0.30);
  opacity: 0; pointer-events: none;
  transition: opacity 0.32s ease;
}
.key-dimmer.open { opacity: 1; pointer-events: auto; }

/* ── SIDE DRAWER ── */
.key-overlay {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(380px, 92vw);
  z-index: 500;
  background: linear-gradient(180deg, #0e1436 0%, #09102a 60%);
  border-left: 1px solid rgba(212,180,80,0.20);
  box-shadow: -8px 0 48px rgba(0,0,0,0.60), -1px 0 0 rgba(212,180,80,0.08);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 0;
  transform: translateX(100%);
  transition: transform 0.34s cubic-bezier(0.32,0,0.18,1);
  will-change: transform;
}
.key-overlay.open { transform: translateX(0); }

/* ── DRAWER HEADER (sticky) ── */
.key-header {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 22px 16px;
  background: rgba(8,12,32,0.96);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(212,180,80,0.12);
}

.key-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem; font-weight: 300;
  color: rgba(212,180,80,0.90);
  letter-spacing: 0.08em;
  margin: 0;
}

.key-close {
  background: none; border: none;
  color: rgba(240,228,200,0.45);
  font-size: 1.4rem; cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  padding: 4px 10px;
  transition: color 0.15s;
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.key-close:hover  { color: rgba(240,228,200,0.88); }
.key-close:active { color: rgba(240,228,200,1.00); }

/* ── DRAWER CONTENT ── */
.key-content {
  padding: 22px 18px;
  padding-bottom: max(48px, calc(env(safe-area-inset-bottom) + 24px));
}

.key-section { margin-bottom: 26px; }

.key-sh {
  font-size: 0.55rem; letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(212,180,80,0.48);
  margin-bottom: 11px;
  padding-bottom: 7px;
  border-bottom: 1px solid rgba(212,180,80,0.10);
}

/* ── KEY GRIDS ── */
.key-grid { display: grid; gap: 6px 5px; }
.g6 { grid-template-columns: repeat(2,1fr); }
.g4 { grid-template-columns: repeat(2,1fr); }
.g3 { grid-template-columns: 1fr; }

/* ── KEY ITEMS ── */
.ki {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px;
  background: rgba(240,228,200,0.025);
  border: 1px solid rgba(212,180,80,0.08);
  border-radius: 6px;
  touch-action: manipulation;
}
.ki-gl {
  font-size: 15px;
  font-family: 'Apple Symbols','Segoe UI Symbol','Noto Sans Symbols',serif;
  flex-shrink: 0; line-height: 1;
  font-variant-emoji: text;
}
.ki-name {
  font-size: 0.67rem;
  font-family: 'Cormorant Garamond', serif;
  color: rgba(240,228,200,0.80);
  display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ki-note {
  font-size: 0.53rem;
  font-family: 'Inter', sans-serif;
  color: rgba(240,228,200,0.32);
  letter-spacing: 0.05em;
  display: block; margin-top: 1px;
}
.ki-sw { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── EMBED MODE (?embed=1) ── */
html.embed body {
  padding: 0;
  min-height: unset;
  background: transparent;
  justify-content: flex-start;
}
html.embed .chart-label,
html.embed .chart-sub { display: none; }
html.embed .chart-wrap { width: 100%; height: min(100vw, 680px); }
html.embed .key-btn { display: none; }

/* ── TABLET (≤768px) ── */
@media (max-width: 768px) {
  body { padding: 32px 16px 88px; }
  .chart-label { letter-spacing: 0.20em; margin-bottom: 20px; }
  .key-overlay { width: min(400px, 94vw); }
}

/* ── MOBILE (≤600px) ── */
@media (max-width: 600px) {
  body { padding: 18px 10px 80px; }
  .chart-label { font-size: 0.58rem; letter-spacing: 0.14em; margin-bottom: 14px; }
  .chart-sub   { font-size: 0.54rem; letter-spacing: 0.11em; margin-top: 12px; }
  .chart-wrap  { width: min(720px, 98vw); height: min(720px, 98vw); }
  .key-overlay { width: 100vw; border-left: none; }
  .key-header  { padding: 16px 18px 13px; }
  .key-title   { font-size: 1.1rem; }
  .key-content { padding: 16px 14px; }
  .ki          { padding: 6px 8px; gap: 7px; }
  .ki-name     { font-size: 0.64rem; }
  .ki-note     { font-size: 0.50rem; }
  .g6, .g4    { grid-template-columns: 1fr; }
  .key-btn    { width: 52px; height: 52px; font-size: 1.45rem; }
}

/* ── LANDSCAPE MOBILE (short + wide) ── */
@media (max-height: 500px) and (orientation: landscape) {
  body { padding: 10px 16px; flex-direction: row; gap: 16px; align-items: center; justify-content: center; }
  .chart-label, .chart-sub { display: none; }
  .chart-wrap { width: min(440px, 58vw); height: min(440px, 58vw); }
  .key-btn { bottom: 10px; right: 10px; }
}
</style>
</head>
<body>

<div class="chart-label">Natal Chart &nbsp;·&nbsp; Carina</div>
<div class="chart-wrap">
  <svg id="chart-svg" viewBox="-22 -22 764 764" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
</div>
<div class="chart-sub">June 10, 1993 &nbsp;·&nbsp; 6:30 PM CDT &nbsp;·&nbsp; DeKalb, Illinois &nbsp;·&nbsp; Placidus</div>

<!-- Floating key toggle button -->
<button class="key-btn" id="keyBtn" title="Open Chart Key">✦</button>

<!-- Dim overlay (click to close) -->
<div class="key-dimmer" id="keyDimmer"></div>

<!-- Side drawer — slides in from right, chart stays visible -->
<div class="key-overlay" id="keyOverlay" role="complementary" aria-label="Chart Key">

  <div class="key-header">
    <div class="key-title">Chart Key</div>
    <button class="key-close" id="keyClose" aria-label="Close key">←</button>
  </div>

  <div class="key-content">
    <div class="key-section">
      <div class="key-sh">Zodiac Signs</div>
      <div class="key-grid g6" id="kS"></div>
    </div>
    <div class="key-section">
      <div class="key-sh">Planets &amp; Points</div>
      <div class="key-grid g6" id="kP"></div>
    </div>
    <div class="key-section">
      <div class="key-sh">Aspect Lines</div>
      <div class="key-grid g3" id="kA"></div>
    </div>
    <div class="key-section">
      <div class="key-sh">Elements</div>
      <div class="key-grid g4" id="kE"></div>
    </div>
  </div>

</div>

<script>
const T = '︎'; // text variation selector — prevents emoji rendering

// ─── CHART DATA ──────────────────────────────────────────────────────────────
const CHART = {
  asc: 236.87, mc: 161.65,
  cusps: [236.87,267.99,304.70,341.65,12.59,36.91,56.87,87.99,124.70,161.65,192.59,216.91],
  planets: [
    {id:'sun',     gl:'☉'+T, deg: 80.07, retro:false, grp:'luminary', si:2,  sd:20},
    {id:'moon',    gl:'☽'+T, deg:336.30, retro:false, grp:'luminary', si:11, sd: 6},
    {id:'mercury', gl:'☿'+T, deg:103.50, retro:false, grp:'personal', si:3,  sd:13},
    {id:'venus',   gl:'♀'+T, deg: 34.31, retro:false, grp:'personal', si:1,  sd: 4},
    {id:'mars',    gl:'♂'+T, deg:142.99, retro:false, grp:'personal', si:4,  sd:22},
    {id:'jupiter', gl:'♃'+T, deg:184.90, retro:false, grp:'social',   si:6,  sd: 4},
    {id:'saturn',  gl:'♄'+T, deg:330.33, retro:true,  grp:'social',   si:11, sd: 0},
    {id:'uranus',  gl:'♅'+T, deg:291.39, retro:true,  grp:'outer',    si:9,  sd:21},
    {id:'neptune', gl:'♆'+T, deg:290.56, retro:true,  grp:'outer',    si:9,  sd:20},
    {id:'pluto',   gl:'♇'+T, deg:233.42, retro:true,  grp:'outer',    si:7,  sd:23},
    {id:'chiron',  gl:'⚷'+T, deg:139.76, retro:false, grp:'point',    si:4,  sd:19},
    {id:'nnode',   gl:'☊'+T, deg:251.90, retro:true,  grp:'point',    si:8,  sd:11},
  ],
  aspects:[
    {p1:'nnode',  p2:'mc',      type:'square',     orb:0.25},
    {p1:'sun',    p2:'chiron',  type:'sextile',    orb:0.32},
    {p1:'mars',   p2:'pluto',   type:'square',     orb:0.44},
    {p1:'venus',  p2:'jupiter', type:'inconjunct', orb:0.60},
    {p1:'neptune',p2:'chiron',  type:'inconjunct', orb:0.80},
    {p1:'uranus', p2:'neptune', type:'conjunction',orb:0.84},
    {p1:'moon',   p2:'venus',   type:'sextile',    orb:1.98},
  ],
};

// ─── GEOMETRY ────────────────────────────────────────────────────────────────
const CX=360, CY=360;
const R = {
  rim3:   354, elArc:  347, rim1:   340,
  zodOut: 328, zodMid: 302, zodIn:  276,
  cuspLbl:265, hNum:   162, sepRing:240,
  pGlyph: 244, pLbl:   258,
  asp:    218, cRing:  18,  cDot:   11,
};

// ─── PALETTE — WHIMSIGOTH SACRED GEOMETRY ────────────────────────────────────
// Jewel navy base, warm gold, cerulean, amber — NO purple
const C = {
  gold:       '#d0a840',
  goldM:      'rgba(208,168,64,0.28)',
  goldBrt:    'rgba(208,168,64,0.58)',
  goldF:      'rgba(208,168,64,0.07)',
  ivory:      '#f0e4cc',
  ivoryM:     'rgba(240,228,200,0.55)',
  ivoryDim:   'rgba(240,228,200,0.28)',
  ivoryDimmer:'rgba(240,228,200,0.14)',
  // Blues
  cerulean:   '#3e8fc0',
  ceruleanM:  'rgba(62,143,192,0.60)',
  ceruleanF:  'rgba(62,143,192,0.10)',
  sky:        '#6abce0',
  moonSilver: '#b0c8e0',
  // Teal stays
  teal:       '#5ab8a8',
  tealM:      'rgba(90,184,168,0.60)',
  // Warm rose (not purple)
  rose:       '#c89898',
  roseM:      'rgba(200,152,152,0.65)',
  // Element fills — watercolor washes
  fire:   'rgba(210,130,48,0.26)',
  earth:  'rgba(80,142,68,0.19)',
  air:    'rgba(80,112,200,0.20)',
  water:  'rgba(40,128,188,0.28)',
  // Element arc colors on outer rim
  fireArc:  '#c87840',
  earthArc: '#58925a',
  airArc:   '#5878c8',
  waterArc: '#3880b8',
  // Structural
  axis:   'rgba(208,168,64,0.72)',
  hLine:  'rgba(208,168,64,0.15)',
};

const PLANET_COLOR = {
  luminary: '#d8b850',
  personal: '#c8a0a0',
  social:   '#7ab0d0',
  outer:    '#5ab8a8',
  point:    'rgba(240,228,200,0.70)',
};

const ASP_STYLE = {
  conjunction: {color:'#d0a840',                 dash:'',   w:1.2,op:0.82},
  sextile:     {color:'#3e8fc0',                 dash:'',   w:0.9,op:0.70},
  trine:       {color:'#5ab8a8',                 dash:'',   w:0.9,op:0.65},
  square:      {color:'#c89898',                 dash:'5,3',w:0.9,op:0.75},
  opposition:  {color:'#c89898',                 dash:'',   w:0.9,op:0.68},
  inconjunct:  {color:'rgba(240,228,200,0.38)',   dash:'2,4',w:0.7,op:0.65},
};

const SIGNS = [
  {gl:'♈'+T,el:'fire', name:'Aries',      abbr:'Ar',color:'#d4a050'},
  {gl:'♉'+T,el:'earth',name:'Taurus',     abbr:'Ta',color:'#80c070'},
  {gl:'♊'+T,el:'air',  name:'Gemini',     abbr:'Ge',color:'#8090d8'},
  {gl:'♋'+T,el:'water',name:'Cancer',     abbr:'Cn',color:'#50b8d0'},
  {gl:'♌'+T,el:'fire', name:'Leo',        abbr:'Le',color:'#d4a050'},
  {gl:'♍'+T,el:'earth',name:'Virgo',      abbr:'Vi',color:'#80c070'},
  {gl:'♎'+T,el:'air',  name:'Libra',      abbr:'Li',color:'#8090d8'},
  {gl:'♏'+T,el:'water',name:'Scorpio',    abbr:'Sc',color:'#50b8d0'},
  {gl:'♐'+T,el:'fire', name:'Sagittarius',abbr:'Sg',color:'#d4a050'},
  {gl:'♑'+T,el:'earth',name:'Capricorn',  abbr:'Cp',color:'#80c070'},
  {gl:'♒'+T,el:'air',  name:'Aquarius',   abbr:'Aq',color:'#8090d8'},
  {gl:'♓'+T,el:'water',name:'Pisces',     abbr:'Pi',color:'#50b8d0'},
];

const GLYPH_FONT = "'Apple Symbols','Segoe UI Symbol','Noto Sans Symbols',serif";
const MODALITY = {Ar:'Cardinal',Ta:'Fixed',Ge:'Mutable',Cn:'Cardinal',Le:'Fixed',Vi:'Mutable',Li:'Cardinal',Sc:'Fixed',Sg:'Mutable',Cp:'Cardinal',Aq:'Fixed',Pi:'Mutable'};

// ─── MATH ────────────────────────────────────────────────────────────────────
const norm = a=>((a%360)+360)%360;
const rad  = d=>d*Math.PI/180;
const f    = n=>n.toFixed(2);
const svgA = (ecl,asc)=>norm(180-(ecl-asc));
const pt   = (a,r)=>({x:CX+r*Math.cos(rad(a)),y:CY+r*Math.sin(rad(a))});
const ept  = (ecl,r,asc)=>pt(svgA(ecl,asc),r);

function sector(s,e,rO,rI,asc){
  const a1=svgA(s,asc),a2=svgA(e,asc);
  const o1=pt(a1,rO),o2=pt(a2,rO),i1=pt(a1,rI),i2=pt(a2,rI);
  return `M${f(o1.x)} ${f(o1.y)} A${rO} ${rO} 0 0 0 ${f(o2.x)} ${f(o2.y)} L${f(i2.x)} ${f(i2.y)} A${rI} ${rI} 0 0 1 ${f(i1.x)} ${f(i1.y)}Z`;
}
function arcStroke(s,e,r,asc){
  const a1=svgA(s,asc),a2=svgA(e,asc);
  const p1=pt(a1,r),p2=pt(a2,r);
  return `M${f(p1.x)} ${f(p1.y)} A${r} ${r} 0 0 0 ${f(p2.x)} ${f(p2.y)}`;
}
function eclSD(ecl){
  const idx=Math.floor(ecl/30)%12;
  return {idx,deg:Math.floor(ecl%30),sign:SIGNS[idx]};
}

// ─── SPREAD ──────────────────────────────────────────────────────────────────
function spread(planets){
  const sorted=[...planets].sort((a,b)=>a.deg-b.deg);
  const out=[];let i=0;
  while(i<sorted.length){
    let j=i+1;
    while(j<sorted.length&&sorted[j].deg-sorted[i].deg<8)j++;
    const cl=sorted.slice(i,j);
    if(cl.length===1){out.push({...cl[0],disp:cl[0].deg});}
    else{
      const mean=cl.reduce((s,p)=>s+p.deg,0)/cl.length;
      const step=cl.length===2?14:11;
      const off=-(cl.length-1)*step/2;
      cl.forEach((p,k)=>out.push({...p,disp:mean+off+k*step}));
    }
    i=j;
  }
  return out;
}

// ─── SVG HELPERS ─────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,String(v));
  return e;
}
function tx(content,attrs){const t=el('text',attrs);t.textContent=content;return t;}
function glTx(content,x,y,size,color,opacity,extra={}){
  return tx(content,{x:f(x),y:f(y),fill:color,opacity,
    'font-size':size,'font-family':GLYPH_FONT,'font-variant-emoji':'text',
    'text-anchor':'middle','dominant-baseline':'central',...extra});
}

// ─── DEFS ────────────────────────────────────────────────────────────────────
function drawDefs(svg){
  const defs=el('defs',{});

  // Jewel navy background glow
  const g1=el('radialGradient',{id:'bgG',cx:'50%',cy:'50%',r:'50%'});
  g1.appendChild(el('stop',{offset:'0%',  'stop-color':'#1a3060','stop-opacity':'0.80'}));
  g1.appendChild(el('stop',{offset:'55%', 'stop-color':'#0e1030','stop-opacity':'0.45'}));
  g1.appendChild(el('stop',{offset:'100%','stop-color':'#09102a','stop-opacity':'0'}));
  defs.appendChild(g1);

  // Warm amber ribbon (diagonal)
  const g2=el('linearGradient',{id:'amberRib',x1:'0%',y1:'0%',x2:'100%',y2:'100%'});
  g2.appendChild(el('stop',{offset:'0%',  'stop-color':'#c89040','stop-opacity':'0'}));
  g2.appendChild(el('stop',{offset:'35%', 'stop-color':'#c89040','stop-opacity':'0.06'}));
  g2.appendChild(el('stop',{offset:'65%', 'stop-color':'#d4a848','stop-opacity':'0.05'}));
  g2.appendChild(el('stop',{offset:'100%','stop-color':'#c89040','stop-opacity':'0'}));
  defs.appendChild(g2);

  // Cerulean ribbon (opposite diagonal)
  const g3=el('linearGradient',{id:'cyanRib',x1:'100%',y1:'0%',x2:'0%',y2:'100%'});
  g3.appendChild(el('stop',{offset:'0%',  'stop-color':'#3880b8','stop-opacity':'0'}));
  g3.appendChild(el('stop',{offset:'40%', 'stop-color':'#3880b8','stop-opacity':'0.08'}));
  g3.appendChild(el('stop',{offset:'70%', 'stop-color':'#50a0c8','stop-opacity':'0.06'}));
  g3.appendChild(el('stop',{offset:'100%','stop-color':'#3880b8','stop-opacity':'0'}));
  defs.appendChild(g3);

  // Watercolor blur filter for element washes
  const fWC=el('filter',{id:'wc',x:'-30%',y:'-30%',width:'160%',height:'160%'});
  fWC.appendChild(el('feGaussianBlur',{stdDeviation:'12'}));
  defs.appendChild(fWC);

  // Inner glow filter
  const fG=el('filter',{id:'glow',x:'-20%',y:'-20%',width:'140%',height:'140%'});

  defs.appendChild(fG);

  svg.appendChild(defs);
}

// ─── OUTER RINGS ─────────────────────────────────────────────────────────────
function drawRims(svg){
  const g=el('g',{id:'rims'});

  // Element color arcs on outer rim — the jewel-toned crown
  for(let i=0;i<12;i++){
    const s=SIGNS[i];
    g.appendChild(el('path',{
      d:arcStroke(i*30,i*30+30,R.elArc,CHART.asc),
      fill:'none',stroke:C[s.el+'Arc'],'stroke-width':'7',opacity:'0.68','stroke-linecap':'butt',
    }));
  }

  // Thin gold ring borders
  for(const[r,op]of[[R.rim3,0.32],[R.rim1,0.18]])
    g.appendChild(el('circle',{cx:CX,cy:CY,r,fill:'none',stroke:C.gold,'stroke-width':'0.5',opacity:op}));

  // Sign cusp dots
  for(let i=0;i<12;i++){
    const p=ept(i*30,R.rim3+5,CHART.asc);
    g.appendChild(el('circle',{cx:f(p.x),cy:f(p.y),r:2.0,fill:C.gold,opacity:'0.55'}));
  }

  // 10° dots — slightly more visible
  for(let i=0;i<36;i++){
    if(i%3===0)continue;
    const p=ept(i*10,R.rim1,CHART.asc);
    g.appendChild(el('circle',{cx:f(p.x),cy:f(p.y),r:0.9,fill:C.gold,opacity:'0.28'}));
  }

  svg.appendChild(g);
}

// ─── ZODIAC RING ─────────────────────────────────────────────────────────────
function drawZodiac(svg){
  const g=el('g',{id:'zodiac'});

  for(let i=0;i<12;i++){
    const s=SIGNS[i];
    const startEcl=i*30,endEcl=startEcl+30;

    // Sector fill
    g.appendChild(el('path',{
      d:sector(startEcl,endEcl,R.zodOut,R.zodIn,CHART.asc),
      fill:C[s.el],stroke:C.goldM,'stroke-width':'0.6',
    }));

    // 10° tick marks — slightly more visible
    for(const off of[10,20]){
      const a=svgA(startEcl+off,CHART.asc);
      const oT=pt(a,R.zodIn+14),iT=pt(a,R.zodIn+2);
      g.appendChild(el('line',{x1:f(oT.x),y1:f(oT.y),x2:f(iT.x),y2:f(iT.y),stroke:C.goldBrt,'stroke-width':'0.6'}));
    }

    // Sign glyph
    const gp=ept(startEcl+15,R.zodMid,CHART.asc);
    g.appendChild(glTx(s.gl,gp.x,gp.y,21,s.color,'0.93'));
  }

  // Ring boundaries
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.zodOut,fill:'none',stroke:C.goldBrt,'stroke-width':'0.9'}));
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.zodIn, fill:'none',stroke:C.goldM,  'stroke-width':'0.7'}));

  svg.appendChild(g);
}

// ─── INNER WHEEL ─────────────────────────────────────────────────────────────
function drawHouses(svg){
  const g=el('g',{id:'houses'});

  // Inner wheel — jewel navy
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.zodIn,fill:'#09102a'}));
  // Subtle inner tint (slightly lighter center)
  const ig=el('radialGradient',{id:'innerG',cx:'50%',cy:'50%',r:'50%'});
  ig.appendChild(el('stop',{offset:'0%', 'stop-color':'#122040','stop-opacity':'0.6'}));
  ig.appendChild(el('stop',{offset:'100%','stop-color':'#09102a','stop-opacity':'0'}));
  const innerDefs=svg.querySelector('defs')||el('defs',{});
  innerDefs.appendChild(ig);
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.zodIn,fill:'url(#innerG)'}));

  // ── Watercolor alternating house fills ───────────────────────────────────
  // Element color lookup by sign index (Aries=0 through Pisces=11)
  const EL_WC = {
    fire:  'rgba(205,125,45,',
    earth: 'rgba(75,138,65,',
    air:   'rgba(75,108,195,',
    water: 'rgba(38,118,178,',
  };
  const EL_BY_SIGN = ['fire','earth','air','water','fire','earth',
                       'air','water','fire','earth','air','water'];

  for(let i=0;i<12;i++){
    if(i%2===0) continue; // shade odd-indexed houses
    const c1=CHART.cusps[i], c2=CHART.cusps[(i+1)%12];

    // Base sector fill — very light flat wash
    g.appendChild(el('path',{
      d:sector(c1, c2, R.zodIn, R.cDot+6, CHART.asc),
      fill:'rgba(240,228,200,0.04)', stroke:'none',
    }));

    // Watercolor bloom — element-tinted blurred circle at house midpoint
    const mid = c2 > c1 ? (c1+c2)/2 : norm((c1+c2+360)/2);
    const signIdx = Math.floor(CHART.cusps[i]/30) % 12;
    const wcColor = EL_WC[EL_BY_SIGN[signIdx]];
    const blobP = ept(mid, 125, CHART.asc);
    g.appendChild(el('circle',{
      cx:f(blobP.x), cy:f(blobP.y), r:70,
      fill: wcColor + '0.11)', filter:'url(#wc)',
    }));

    // Second smaller bloom offset toward zodiac ring for depth
    const blobP2 = ept(mid, 200, CHART.asc);
    g.appendChild(el('circle',{
      cx:f(blobP2.x), cy:f(blobP2.y), r:45,
      fill: wcColor + '0.07)', filter:'url(#wc)',
    }));
  }

  // Cusp lines + cusp degree labels
  for(let i=0;i<12;i++){
    const cusp=CHART.cusps[i];
    const isAngle=(i%3===0);
    const oP=ept(cusp,R.zodIn,CHART.asc);
    const iP=ept(cusp,R.cDot+6,CHART.asc);

    // Main cusp line — all lines now clearly visible
    g.appendChild(el('line',{
      x1:f(oP.x),y1:f(oP.y),x2:f(iP.x),y2:f(iP.y),
      stroke:isAngle?C.axis:'rgba(208,168,64,0.42)',
      'stroke-width':isAngle?1.4:0.9,
    }));

    // Marker dot at zodiac inner edge
    g.appendChild(el('circle',{cx:f(oP.x),cy:f(oP.y),r:isAngle?2.2:1.6,
      fill:isAngle?C.gold:C.goldM,opacity:isAngle?'0.85':'0.55'}));

    // Marker dot at separator ring — tracks the boundary through the planet zone
    const sp=ept(cusp,R.sepRing,CHART.asc);
    g.appendChild(el('circle',{cx:f(sp.x),cy:f(sp.y),r:isAngle?2.4:1.5,
      fill:isAngle?C.gold:C.goldM,opacity:isAngle?'0.80':'0.48'}));

    // Cusp degree + sign label — larger & more legible
    const{deg,sign}=eclSD(cusp);
    const lp=ept(cusp,R.cuspLbl,CHART.asc);
    g.appendChild(el('circle',{cx:f(lp.x),cy:f(lp.y),r:12,fill:'rgba(8,22,46,0.85)'}));
    g.appendChild(tx(`${deg}°`,{
      x:f(lp.x),y:f(lp.y-4.5),
      fill:isAngle?C.gold:C.ivory,opacity:isAngle?'0.90':'0.72',
      'font-size':isAngle?8.5:7.5,'font-family':"'Inter',sans-serif",
      'text-anchor':'middle','dominant-baseline':'central',
    }));
    g.appendChild(glTx(sign.gl,lp.x,lp.y+5.2,isAngle?8.5:7.5,
      isAngle?C.gold:C.ivory,isAngle?'0.90':'0.68'));
  }

  // House numbers — in center zone, large and clear
  for(let i=0;i<12;i++){
    const c1=CHART.cusps[i],c2=CHART.cusps[(i+1)%12];
    const mid=c2>c1?(c1+c2)/2:norm((c1+c2+360)/2);
    const np=ept(mid,R.hNum,CHART.asc);
    // Dark backing for legibility over aspect lines
    g.appendChild(el('circle',{cx:f(np.x),cy:f(np.y),r:11,fill:'rgba(8,22,46,0.75)'}));
    g.appendChild(tx(String(i+1),{
      x:f(np.x),y:f(np.y),
      fill:C.ivory, opacity:'0.72',
      'font-size':12.5,'font-family':"'Cormorant Garamond',serif",
      'font-weight':'400','font-style':'italic',
      'text-anchor':'middle','dominant-baseline':'central',
    }));
  }

  // Thin separator ring
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.sepRing,fill:'none',stroke:C.goldM,'stroke-width':'0.35'}));

  // Inner aspect circle — cerulean tint, stronger presence
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.asp,
    fill:'rgba(8,12,30,0.45)',stroke:'rgba(62,143,192,0.28)','stroke-width':'0.9'}));

  svg.appendChild(g);
}

// ─── CENTER SUNBURST ─────────────────────────────────────────────────────────
function drawCenter(svg){
  const g=el('g',{id:'center'});

  // 16-ray sunburst — whimsigoth sun motif, sacred geometry
  for(let i=0;i<16;i++){
    const angle=i*(360/16);
    const inner=14, outer=i%2===0?42:30;
    const p1=pt(angle,inner), p2=pt(angle,outer);
    g.appendChild(el('line',{
      x1:f(p1.x),y1:f(p1.y),x2:f(p2.x),y2:f(p2.y),
      stroke:C.gold,'stroke-width': i%2===0?'0.8':'0.4',opacity: i%2===0?'0.30':'0.14',
    }));
  }

  // Glowing halo rings around center
  for(const[r,op]of[[32,0.06],[25,0.07],[19,0.08]])
    g.appendChild(el('circle',{cx:CX,cy:CY,r,fill:'none',stroke:C.gold,'stroke-width':'0.5',opacity:op}));

  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.cRing,fill:'none',stroke:C.goldM,'stroke-width':'0.7'}));
  g.appendChild(el('circle',{cx:CX,cy:CY,r:R.cDot,fill:'#0c1030',stroke:C.gold,'stroke-width':'0.9',opacity:'0.85'}));
  g.appendChild(tx('✦',{x:CX,y:CY,fill:C.gold,opacity:'0.92','font-size':8,'font-family':'serif','text-anchor':'middle','dominant-baseline':'central'}));

  svg.appendChild(g);
}

// ─── ASPECT LINES ────────────────────────────────────────────────────────────
function drawAspects(svg){
  const g=el('g',{id:'aspects'});
  const dMap={};
  CHART.planets.forEach(p=>dMap[p.id]=p.deg);
  dMap.mc=CHART.mc; dMap.asc=CHART.asc;
  for(const asp of CHART.aspects){
    const st=ASP_STYLE[asp.type];if(!st)continue;
    const d1=dMap[asp.p1],d2=dMap[asp.p2];if(d1==null||d2==null)continue;
    const p1=ept(d1,R.asp,CHART.asc),p2=ept(d2,R.asp,CHART.asc);
    const ln=el('line',{x1:f(p1.x),y1:f(p1.y),x2:f(p2.x),y2:f(p2.y),stroke:st.color,'stroke-width':st.w,opacity:st.op});
    if(st.dash)ln.setAttribute('stroke-dasharray',st.dash);
    g.appendChild(ln);
  }
  svg.appendChild(g);
}

// ─── AXES ────────────────────────────────────────────────────────────────────
function drawAxes(svg){
  const g=el('g',{id:'axes'});
  for(const[ecl,label]of[[CHART.asc,'ASC'],[CHART.mc,'MC']]){
    const p1=ept(ecl,R.zodOut+4,CHART.asc),p2=ept(ecl+180,R.zodOut+4,CHART.asc);
    g.appendChild(el('line',{x1:f(p1.x),y1:f(p1.y),x2:f(p2.x),y2:f(p2.y),stroke:C.gold,'stroke-width':'1.1',opacity:'0.55'}));
    const lp=ept(ecl,R.zodOut+28,CHART.asc);
    g.appendChild(tx(label,{x:f(lp.x),y:f(lp.y),fill:C.gold,opacity:'0.85',
      'font-size':8.5,'font-family':"'Inter',sans-serif",'font-weight':'500',
      'letter-spacing':'0.12em','text-anchor':'middle','dominant-baseline':'central'}));
  }
  svg.appendChild(g);
}

// ─── PLANETS ─────────────────────────────────────────────────────────────────
function drawPlanets(svg){
  const g=el('g',{id:'planets'});
  const sp=spread(CHART.planets);

  for(const p of sp){
    const color=PLANET_COLOR[p.grp];
    const sign=SIGNS[p.si];

    // True position dot on inner circle
    const tP=ept(p.deg,R.asp,CHART.asc);
    g.appendChild(el('circle',{cx:f(tP.x),cy:f(tP.y),r:2.8,fill:color,opacity:'0.88'}));

    // Connector when spread
    if(Math.abs(p.disp-p.deg)>2.5){
      const lA=ept(p.deg,R.asp+5,CHART.asc),lB=ept(p.disp,R.pGlyph-14,CHART.asc);
      g.appendChild(el('line',{x1:f(lA.x),y1:f(lA.y),x2:f(lB.x),y2:f(lB.y),stroke:color,'stroke-width':'0.5',opacity:'0.42'}));
    }

    // Degree + sign OUTSIDE glyph (near zodiac ring)
    const lp=ept(p.disp,R.pLbl,CHART.asc);
    g.appendChild(tx(`${p.sd}°`,{x:f(lp.x),y:f(lp.y-4.2),fill:color,opacity:'0.72',
      'font-size':8,'font-family':"'Inter',sans-serif",'text-anchor':'middle','dominant-baseline':'central'}));
    g.appendChild(glTx(sign.gl,lp.x,lp.y+5.2,8.5,color,'0.68'));

    // Glyph
    const gp=ept(p.disp,R.pGlyph,CHART.asc);
    g.appendChild(el('circle',{cx:f(gp.x),cy:f(gp.y),r:13,fill:color,opacity:'0.05'}));
    g.appendChild(glTx(p.gl,gp.x,gp.y,21,color,'0.97'));

    // Retrograde Rx — same radius, adjacent, larger
    if(p.retro){
      const rxA=svgA(p.disp,CHART.asc)+9;
      const rxP=pt(rxA,R.pGlyph-10);
      g.appendChild(tx('Rx',{x:f(rxP.x),y:f(rxP.y),fill:color,opacity:'0.68',
        'font-size':7.5,'font-family':"'Inter',sans-serif",'font-style':'italic',
        'text-anchor':'middle','dominant-baseline':'central'}));
    }
  }
  svg.appendChild(g);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const svg=document.getElementById('chart-svg');
  drawDefs(svg);
  drawBackground(svg);
  drawRims(svg);
  drawZodiac(svg);
  drawHouses(svg);
  drawAspects(svg);
  drawAxes(svg);
  drawPlanets(svg);
  drawCenter(svg);
}

  {color:'#58925a',name:'Earth',note:'Taurus · Virgo · Capricorn'},
  {color:'#5878c8',name:'Air',  note:'Gemini · Libra · Aquarius'},
  {color:'#3880b8',name:'Water',note:'Cancer · Scorpio · Pisces'},
];

function ki(html,bc){
  const d=document.createElement('div');
  d.className='ki';d.style.borderColor=`${bc}18`;
  d.innerHTML=html;return d;
}

function buildKey(){
  const sg=document.getElementById('kS');
  for(const s of KS) sg.appendChild(ki(
    `<span class="ki-gl" style="color:${s.color}">${s.gl}</span>
     <span><span class="ki-name">${s.name}</span><span class="ki-note">${s.note}</span></span>`,s.color));

  const pg=document.getElementById('kP');
  for(const p of KP) pg.appendChild(ki(
    `<span class="ki-gl" style="color:${p.c}">${p.gl}</span>
     <span><span class="ki-name">${p.name}</span><span class="ki-note">${p.note}</span></span>`,p.c));

  const ag=document.getElementById('kA');
  for(const a of KA){
    const ln=`<svg width="30" height="14" style="flex-shrink:0">
      <line x1="2" y1="7" x2="28" y2="7" stroke="${a.color}" stroke-width="1.5"
        ${a.dash?'stroke-dasharray="5,3"':''} opacity="0.88"/></svg>`;
    ag.appendChild(ki(`${ln}<span><span class="ki-name">${a.name}</span><span class="ki-note">${a.note}</span></span>`,a.color));
  }

  const eg=document.getElementById('kE');
  for(const e of KE) eg.appendChild(ki(
    `<span class="ki-sw" style="background:${e.color};box-shadow:0 0 7px ${e.color}55"></span>
     <span><span class="ki-name">${e.name}</span><span class="ki-note">${e.note}</span></span>`,e.color));
}
buildKey();

// Key toggle
// ── EMBED MODE — chart-wheel.html?embed=1 strips page chrome
if (new URLSearchParams(location.search).has('embed'))
  document.documentElement.classList.add('embed');

// ── SIDE DRAWER ──────────────────────────────────────────────────────────────
const overlay = document.getElementById('keyOverlay');
const dimmer  = document.getElementById('keyDimmer');
const btn     = document.getElementById('keyBtn');

function openKey() {
  overlay.classList.add('open');
  dimmer.classList.add('open');
  document.body.classList.add('drawer-open');
  btn.textContent = '×';
  btn.title = 'Close Chart Key';
}

function closeKey() {
  overlay.classList.remove('open');
  dimmer.classList.remove('open');
  document.body.classList.remove('drawer-open');
  btn.textContent = '✦';
  btn.title = 'Open Chart Key';
}

btn.addEventListener('click', () =>
  overlay.classList.contains('open') ? closeKey() : openKey());
document.getElementById('keyClose').addEventListener('click', closeKey);
dimmer.addEventListener('click', closeKey);

// Keyboard — Escape to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeKey(); });

// Touch — swipe right on drawer to close
let _swipeX = 0;
overlay.addEventListener('touchstart', e => { _swipeX = e.touches[0].clientX; }, { passive: true });
overlay.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientX - _swipeX > 80) closeKey();
}, { passive: true });

// postMessage bridge — allows parent page to toggle key when embedded
window.addEventListener('message', e => {
  if (e.data === 'toggle-key')
    overlay.classList.contains('open') ? closeKey() : openKey();
});
</script>
</body>
</html>
