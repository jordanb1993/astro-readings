<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="72%">
      <stop offset="0%"   stop-color="#2e0e30"/>
      <stop offset="38%"  stop-color="#1e0828"/>
      <stop offset="70%"  stop-color="#130520"/>
      <stop offset="100%" stop-color="#08020e"/>
    </radialGradient>
    <radialGradient id="rg1" cx="72%" cy="18%" r="45%">
      <stop offset="0%"   stop-color="rgba(192,64,106,0.30)"/>
      <stop offset="100%" stop-color="rgba(192,64,106,0)"/>
    </radialGradient>
    <radialGradient id="rg2" cx="24%" cy="82%" r="42%">
      <stop offset="0%"   stop-color="rgba(200,144,10,0.24)"/>
      <stop offset="100%" stop-color="rgba(200,144,10,0)"/>
    </radialGradient>
    <radialGradient id="rg3" cx="50%" cy="42%" r="36%">
      <stop offset="0%"   stop-color="rgba(212,112,140,0.22)"/>
      <stop offset="100%" stop-color="rgba(212,112,140,0)"/>
    </radialGradient>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rose">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#rg1)"/>
  <rect width="600" height="600" fill="url(#rg2)"/>
  <rect width="600" height="600" fill="url(#rg3)"/>

  <!-- === COMPASS ROSE centered at 300,245 === -->
  <g transform="translate(300,245)">

    <!-- Outer ring halo -->
    <circle cx="0" cy="0" r="166" fill="none" stroke="rgba(240,200,104,0.08)" stroke-width="26"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="166" fill="none" stroke="#f0cc68" stroke-width="2.5" opacity="0.92"/>

    <!-- Tick marks every 15° via rotation -->
    <!-- Cardinals -->
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#f0cc68" stroke-width="2.5" opacity="0.95"/>
    <line x1="0"  y1="154" x2="0"  y2="166"  stroke="#f0cc68" stroke-width="2.5" opacity="0.95"/>
    <line x1="-154" y1="0" x2="-166" y2="0"  stroke="#f0cc68" stroke-width="2.5" opacity="0.95"/>
    <line x1="154"  y1="0" x2="166"  y2="0"  stroke="#f0cc68" stroke-width="2.5" opacity="0.95"/>
    <!-- Intercardinals -->
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" transform="rotate(45)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" transform="rotate(135)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" transform="rotate(225)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" transform="rotate(315)"/>
    <!-- Minor ticks -->
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(15)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(30)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(60)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(75)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(105)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(120)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(150)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(165)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(195)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(210)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(240)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(255)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(285)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(300)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(330)"/>
    <line x1="0" y1="-154" x2="0" y2="-166" stroke="#e0a8c0" stroke-width="1.2" opacity="0.52" transform="rotate(345)"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="116" fill="none" stroke="#d4a8c0" stroke-width="0.8" opacity="0.38"/>

    <!-- Cardinal arrows glow -->
    <polygon points="0,-144 10,-18 0,-6 -10,-18" fill="#fce870" opacity="0.40" filter="url(#glow-gold)"/>
    <polygon points="0,144 10,18 0,6 -10,18"   fill="#e8c050" opacity="0.28" filter="url(#glow-gold)"/>
    <polygon points="144,0 18,10 6,0 18,-10"    fill="#e8c050" opacity="0.24" filter="url(#glow-gold)"/>
    <polygon points="-144,0 -18,10 -6,0 -18,-10" fill="#e8c050" opacity="0.24" filter="url(#glow-gold)"/>

    <!-- Cardinal arrows fill -->
    <polygon points="0,-144 10,-18 0,-6 -10,-18" fill="#fce870" opacity="0.96"/>
    <polygon points="0,144 10,18 0,6 -10,18"   fill="#e8c050" opacity="0.78"/>
    <polygon points="144,0 18,10 6,0 18,-10"    fill="#e8c050" opacity="0.74"/>
    <polygon points="-144,0 -18,10 -6,0 -18,-10" fill="#e8c050" opacity="0.74"/>

    <!-- Diagonal arrows -->
    <polygon points="102,-102 14,-8 6,-6 8,-14" fill="#eeaad0" opacity="0.95"/>
    <polygon points="-102,-102 -14,-8 -6,-6 -8,-14" fill="#eeaad0" opacity="0.84"/>
    <polygon points="102,102 14,8 6,6 8,14" fill="#eeaad0" opacity="0.84"/>
    <polygon points="-102,102 -14,8 -6,6 -8,14" fill="#eeaad0" opacity="0.84"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="16" fill="#f0c858" opacity="0.82" filter="url(#glow-gold)"/>
    <circle cx="0" cy="0" r="16" fill="#f0c858"/>
    <circle cx="0" cy="0" r="9"  fill="#1a0630"/>
    <circle cx="0" cy="0" r="3.5" fill="#f0c858"/>

  </g>

  <!-- PATHFINDER text glow -->
  <text x="300" y="472" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" letter-spacing="11"
        fill="#f0cc68" opacity="0.32" filter="url(#text-glow)">PATHFINDER</text>
  <!-- PATHFINDER text -->
  <text x="300" y="472" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" letter-spacing="11"
        fill="#f0cc68">PATHFINDER</text>

  <!-- Tagline -->
  <text x="300" y="510" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="3.2"
        fill="#e0b0c8" opacity="0.80">natal chart · transits · the wheel of the year</text>

  <!-- Attribution -->
  <text x="300" y="548" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11" letter-spacing="2"
        fill="#c9a84c" opacity="0.50">by Jordan Barney</text>

</svg>
