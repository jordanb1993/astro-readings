<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#050e1a"/>
      <stop offset="40%"  stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#0e1020"/>
    </linearGradient>
    <linearGradient id="dawn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c06020" stop-opacity="0.00"/>
      <stop offset="70%"  stop-color="#c07030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d08040" stop-opacity="0.32"/>
    </linearGradient>
    <radialGradient id="sun-halo" cx="50%" cy="78%" r="38%">
      <stop offset="0%"   stop-color="#f0b030" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f0b030" stop-opacity="0.00"/>
    </radialGradient>
    <!-- Teal horizon glow -->
