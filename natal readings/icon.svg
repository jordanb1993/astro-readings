<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: rich rose-plum with center warmth -->
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#2e0e30"/>
      <stop offset="35%"  stop-color="#1e0828"/>
      <stop offset="70%"  stop-color="#130520"/>
      <stop offset="100%" stop-color="#08020e"/>
    </radialGradient>
    <!-- Rose glow patch top-right -->
    <radialGradient id="rose-glow" cx="70%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#c0406a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c0406a" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold glow patch bottom-left -->
    <radialGradient id="gold-glow" cx="28%" cy="72%" r="38%">
      <stop offset="0%"   stop-color="#c8900a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c8900a" stop-opacity="0"/>
    </radialGradient>
    <!-- Center halo -->
    <radialGradient id="center-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d4708c" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#b85070" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b85070" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ring" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rose" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-center" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#rose-glow)"/>
  <rect width="512" height="512" rx="112" fill="url(#gold-glow)"/>
  <rect width="512" height="512" rx="112" fill="url(#center-halo)"/>

  <!-- Outer ring: rose-gold halo -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#d4907a" stroke-width="12" opacity="0.15" filter="url(#glow-ring)"/>
  <!-- Outer ring: bright -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#f0cc68" stroke-width="2.5" opacity="0.92"/>

  <!-- Tick marks -->
  <line x1="256.00" y1="52.00" x2="256.00" y2="28.00" stroke="#e8c060" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
  <line x1="310.87" y1="51.22" x2="314.23" y2="38.67" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="362.00" y1="72.40" x2="368.50" y2="61.14" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="402.37" y1="109.63" x2="416.51" y2="95.49" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
  <line x1="439.60" y1="150.00" x2="450.86" y2="143.50" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="460.78" y1="201.13" x2="473.33" y2="197.77" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="460.00" y1="256.00" x2="484.00" y2="256.00" stroke="#e8c060" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
  <line x1="460.78" y1="310.87" x2="473.33" y2="314.23" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="439.60" y1="362.00" x2="450.86" y2="368.50" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="402.37" y1="402.37" x2="416.51" y2="416.51" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
  <line x1="362.00" y1="439.60" x2="368.50" y2="450.86" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="310.87" y1="460.78" x2="314.23" y2="473.33" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="256.00" y1="460.00" x2="256.00" y2="484.00" stroke="#e8c060" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
  <line x1="201.13" y1="460.78" x2="197.77" y2="473.33" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="150.00" y1="439.60" x2="143.50" y2="450.86" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="109.63" y1="402.37" x2="95.49" y2="416.51" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
  <line x1="72.40" y1="362.00" x2="61.14" y2="368.50" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="51.22" y1="310.87" x2="38.67" y2="314.23" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="52.00" y1="256.00" x2="28.00" y2="256.00" stroke="#e8c060" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
  <line x1="51.22" y1="201.13" x2="38.67" y2="197.77" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="72.40" y1="150.00" x2="61.14" y2="143.50" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="109.63" y1="109.63" x2="95.49" y2="95.49" stroke="#e0a8c0" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
  <line x1="150.00" y1="72.40" x2="143.50" y2="61.14" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="201.13" y1="51.22" x2="197.77" y2="38.67" stroke="#e8c060" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>

  <!-- Inner ring: rose-gold -->
  <circle cx="256" cy="256" r="162" fill="none" stroke="#d4a8c0" stroke-width="1.5" opacity="0.55"/>
  <!-- Innermost ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.28"/>

  <!-- Cardinal points — glow layer -->
  <g transform="translate(256,256)" fill="#f8e870" opacity="0.35" filter="url(#glow-gold)">
    <polygon points="0,-208  14,-34  0,-10  -14,-34"/>
    <polygon points="0,208   14,34   0,10   -14,34"/>
    <polygon points="208,0   34,14   10,0   34,-14"/>
    <polygon points="-208,0 -34,14  -10,0  -34,-14"/>
  </g>

  <!-- Cardinal points — North: brightest -->
  <polygon points="0,-208  13,-33  0,-9  -13,-33" transform="translate(256,256)" fill="#fce870"/>
  <!-- S E W -->
  <g transform="translate(256,256)" fill="#e8c050">
    <polygon points="0,208   13,33   0,9    -13,33"/>
    <polygon points="208,0   33,13   9,0    33,-13"/>
    <polygon points="-208,0 -33,13  -9,0   -33,-13"/>
  </g>

  <!-- Diagonal (rose) — glow -->
  <g transform="translate(256,256)" fill="#f0a0c8" opacity="0.40" filter="url(#glow-rose)">
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(45)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(135)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(225)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(315)"/>
  </g>
  <!-- Diagonal (rose) — fill -->
  <g transform="translate(256,256)" fill="#eeaad0" opacity="0.95">
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(45)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(135)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(225)"/>
    <polygon points="0,-108  10,-24  0,0  -10,-24" transform="rotate(315)"/>
  </g>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="24" fill="#e8a8b8" opacity="0.30" filter="url(#glow-center)"/>
  <!-- Center disc -->
  <circle cx="256" cy="256" r="17" fill="#f0c858"/>
  <circle cx="256" cy="256" r="9"  fill="#1a0630"/>
  <circle cx="256" cy="256" r="3.5" fill="#f0c858" opacity="0.90"/>

  <!-- N tip star + glow -->
  <circle cx="256" cy="38" r="9"   fill="#f8e060" opacity="0.22" filter="url(#glow-gold)"/>
  <circle cx="256" cy="38" r="5.5" fill="#fce870"/>
  <!-- E S W tips -->
  <circle cx="474" cy="256" r="4.5" fill="#e8c050"/>
  <circle cx="256" cy="474" r="4.5" fill="#e8c050"/>
  <circle cx="38"  cy="256" r="4.5" fill="#e8c050"/>
</svg>